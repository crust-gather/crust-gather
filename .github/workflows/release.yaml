on:
  # Indicates I want to run this workflow on all branches, PR, and tags
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["main"]

env:
  # Rust build arguments
  BUILD_ARGS: "--release"
  # The binary name
  BIN_NAME: "kubectl-crust-gather"
  TAG: ${{ github.ref_name }}
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io
  HELM_REGISTRY: ghcr.io

permissions:
  contents: write

jobs:

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Git repo
        uses: actions/checkout@v6

      # Linux & Windows
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-unknown-linux-gnu
          components: rustfmt, clippy

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: Test binary
        run: cargo t

  build:
    name: Build - ${{ matrix.platform.name }}
    needs: test
    # By default, runs on Ubuntu, otherwise, override with the desired os
    runs-on: ${{ matrix.platform.os || 'ubuntu-24.04' }}
    strategy:
      matrix:
        # Set platforms you want to build your binaries on
        platform:
          # Linux
          # The name is used for pretty print
          - name: Linux x86_64
            # The used Rust target architecture
            target: x86_64-unknown-linux-musl

          - name: Linux aarch64
            target: aarch64-unknown-linux-gnu

          # Mac OS
          - name: MacOS x86_64
            target: x86_64-apple-darwin

          - name: MacOS aarch64
            target: aarch64-apple-darwin

          # Windows
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc

          - name: Windows aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout Git repo
        uses: actions/checkout@v6

      - name: Set release tag
        if: startsWith( github.ref, 'refs/tags/v' )
        shell: bash
        run: sed -i -E "s/^version = \".+\"/version = \"${GITHUB_REF_NAME#v}\"/" Cargo.toml

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}
          components: rustfmt, clippy

      - name: Build ${{ matrix.platform.name }} binary
        run: |
          cargo install cargo-cross
          cargo cross build $BUILD_ARGS --target ${{ matrix.platform.target }}

      - name: Store artifact
        uses: actions/upload-artifact@v7
        id: store-build
        with:
          # Finally, we store the binary as GitHub artifact for later usage
          name: ${{ matrix.platform.target }}-${{ env.BIN_NAME }}
          path: target/${{ matrix.platform.target }}/release/${{ env.BIN_NAME }}${{ contains(matrix.platform.target, 'windows') && '.exe' || '' }}
          retention-days: 1

      - name: Output artifact URL
        run:  echo 'Artifact URL is ${{ steps.store-build.outputs.artifact-url }}'

  docker:
    name: Build and push Docker image
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Docker login
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm-chart:
    name: Package and push Helm chart
    needs: [docker]
    if: startsWith( github.ref, 'refs/tags/v' )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to OCI registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${HELM_REGISTRY}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package and push chart
        shell: bash
        run: |
          set -euo pipefail
          chart_version="${TAG#v}"
          repo_owner_lc="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"

          sed -i "s/^version: .*/version: ${chart_version}/" charts/crust-gather/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${TAG}\"/" charts/crust-gather/Chart.yaml

          mkdir -p dist
          helm package charts/crust-gather --destination dist
          helm push "dist/crust-gather-${chart_version}.tgz" "oci://${HELM_REGISTRY}/${repo_owner_lc}"

  release:
    name: Release
    needs: [docker, helm-chart]
    # We run the release job only if a tag starts with 'v' letter
    if: startsWith( github.ref, 'refs/tags/v' )
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Git repo
        uses: actions/checkout@v6

      # Goreleaser
      - name: Set up Go
        uses: actions/setup-go@v6

      # Download all artifacts
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          # Run goreleaser and ignore non-committed files (downloaded artifacts)
          args: release --skip=validate --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update new version in krew-index
        uses: rajatjindal/krew-release-bot@v0.0.51

# Default values for crust-gather.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/crust-gather/crust-gather
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# Additional Kubernetes annotations applied to all chart resources.
# Resource-specific generated annotations, such as Helm hooks, are still added where needed.
annotations: {}

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# Additional Kubernetes labels applied to all chart resources.
# Built-in chart labels are always included; values here are merged on top.
labels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000


resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi


# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

reference: ""
# PEM-encoded CA certificate content, typically passed via:
# helm install ... --set-file ca_file=/path/to/registry-ca.pem
ca_file: ""
token: ""
username: ""
password: ""
hideSensitive: false

job:
  backoffLimit: 6
  restartPolicy: OnFailure
  ttlSecondsAfterFinished: 300
  command: []
  args: []
  # Exclude chart-managed resources from collection by built-in Helm labels.
  # This prevents crust-gather from collecting its own Job, ServiceAccount,
  # chart-generated Secrets such as OCI auth or CA material, and Helm release
  # Secrets that may contain rendered credentials in their stored manifests.
  excludeCrustGatherResources: true
  hook:
    enabled: true
    events:
      - post-install
      - post-upgrade
    deletePolicy:
      - before-hook-creation

rbac:
  clusterAdminBinding:
    enabled: true

{{- if .Values.rbac.clusterAdminBinding.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "crust-gather.fullname" . }}-cluster-admin
  labels:
    {{- include "crust-gather.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "crust-gather.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
